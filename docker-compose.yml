services:
  postgres:
    image: imresamu/postgis:16-3.4-alpine
    container_name: comma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-comma}
      POSTGRES_USER: ${POSTGRES_USER:-comma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comma}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comma} -d ${POSTGRES_DB:-comma}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comma-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-comma}:${POSTGRES_PASSWORD:-comma}@postgres:5432/${POSTGRES_DB:-comma}?sslmode=disable
      STORAGE_PATH: /data
      PORT: "8080"
      COMMA_DONGLE_ID: ${COMMA_DONGLE_ID:-}
      ALLOWED_SERIALS: ${ALLOWED_SERIALS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      SESSION_SECRET: ${SESSION_SECRET:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      ALPR_ENCRYPTION_KEY: ${ALPR_ENCRYPTION_KEY:-}
    ports:
      - "${BACKEND_PORT:-7070}:8080"
    volumes:
      - storage:/data

  frontend:
    profiles: ["prod"]
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:7070}
        NEXT_PUBLIC_DONGLE_ID: ${NEXT_PUBLIC_DONGLE_ID:-default}
    container_name: comma-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:3000"

  # ALPR (automatic license plate recognition) engine sidecar. Opt-in via
  # the `alpr` profile -- bare `docker compose up` does NOT start it.
  # Bring it up with `make alpr-up`. See docs/ALPR.md for the GPU variant
  # and docs/ALPR-ENGINE-DECISION.md for the engine choice rationale.
  #
  # The image is built locally (no upstream image bundles the HTTP wrapper
  # this project requires); tag is `comma-alpr:dev`.
  alpr:
    profiles: ["alpr"]
    build:
      context: .
      dockerfile: docker/alpr/Dockerfile
    image: comma-alpr:dev
    container_name: comma-alpr
    restart: unless-stopped
    environment:
      ALPR_REGION: ${ALPR_REGION:-us}
      ALPR_LOG_LEVEL: ${ALPR_LOG_LEVEL:-info}
    # No host port published in prod -- the backend talks to `alpr:8081`
    # over the internal compose network. Uncomment the line below to expose
    # the engine on the host for local curl / debugging.
    # ports:
    #   - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    # GPU activation: uncomment the device_requests block below and switch
    # the Dockerfile base image to a CUDA-enabled variant per the
    # instructions in docs/ALPR.md. Requires nvidia-docker2 on the host.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: ["gpu"]

volumes:
  pgdata:
  storage:
